
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventAionion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">event<span>Aionion</span></div>

  <div class="search-box">
    <input type="text" placeholder="Search events..." />
  </div>

  <div class="nav-actions">
    <button class="create-btn">Create Event</button>
    <button class="login-btn">Login</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Discover Amazing Events 🎉</h1>
  <p>Book tickets, explore events, and enjoy experiences</p>
</section>

<!-- EVENTS -->
<section class="events-section">
  <h2>Featured Events ✨</h2>

  <div class="events-grid">

    <div class="card">
      <img src="https://source.unsplash.com/400x250/?concert" />
      <div class="card-content">
        <h3>Music Night Festival</h3>
        <p>📍 Chennai</p>
        <p>📅 Apr 10, 2026</p>
        <span class="tag paid">Paid</span>
      </div>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x250/?conference" />
      <div class="card-content">
        <h3>Tech Conference</h3>
        <p>📍 Bangalore</p>
        <p>📅 May 2, 2026</p>
        <span class="tag free">Free</span>
      </div>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x250/?startup" />
      <div class="card-content">
        <h3>Startup Meetup</h3>
        <p>📍 Hyderabad</p>
        <p>📅 June 15, 2026</p>
        <span class="tag paid">Paid</span>
      </div>
    </div>

  </div>
</section>

</body>
</html>
