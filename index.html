<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventAionion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">event<span>Aionion</span></div>

  <input class="search" placeholder="Search events..." />

  <div class="nav-right">
    <button class="create-btn">+ Create Event</button>
    <button class="login-btn">Login</button>
  </div>
</header>

<!-- CATEGORY -->
<div class="categories">
  <button class="active">All</button>
  <button>Music</button>
  <button>Tech</button>
  <button>Business</button>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Find Your Next Experience 🎉</h1>
</section>

<!-- EVENTS -->
<section class="events">
  <div class="grid">

    <div class="card" onclick="openEvent()">
      <img src="https://source.unsplash.com/400x250/?concert"/>
      <div class="content">
        <h3>Music Fest 2026</h3>
        <p>📍 Chennai</p>
        <p>📅 Apr 10</p>
        <span class="paid">Paid</span>
      </div>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x250/?startup"/>
      <div class="content">
        <h3>Startup Meetup</h3>
        <p>📍 Bangalore</p>
        <p>📅 May 2</p>
        <span class="free">Free</span>
      </div>
    </div>

  </div>
</section>

<!-- EVENT MODAL -->
<div class="modal" id="eventModal">
  <div class="modal-content">
    <span class="close" onclick="closeEvent()">&times;</span>

    <img src="https://source.unsplash.com/800x400/?concert"/>

    <h2>Music Fest 2026</h2>
    <p>📍 Chennai | 📅 Apr 10, 2026</p>

    <p class="desc">
      Enjoy live music, food, and amazing vibes with top artists.
    </p>

    <button class="book-btn">Book Ticket</button>
    <div class="booking-form">
  <input id="name" placeholder="Your Name" />
  <input id="phone" placeholder="Phone Number" />
  <input id="qty" type="number" placeholder="Tickets" />

  <button onclick="bookTicket()">Confirm Booking</button>
</div>

<p id="ticketResult"></p>
  </div>
</div>

<script>
function openEvent() {
  document.getElementById("eventModal").style.display = "flex";
}

function closeEvent() {
  document.getElementById("eventModal").style.display = "none";
}
</script>

</body>
</html>
